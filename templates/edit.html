{% extends "base.html" %}

{% block title %}Edit Expense - Expense Tracker{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <h1 class="mb-4"> Edit Expense</h1>
    
    <div style="background: #1a1a1a; padding: 2rem; border-radius: 10px; border: 1px solid #333;">
        <form method="POST" class="row g-3">
            <div class="col-md-6">
                <label for="date" class="form-label"> Date</label>
                <input type="date" name="date" id="date" value="{{ expense.date }}" class="form-control" required>
            </div>
            
            <div class="col-md-6">
                <label for="category" class="form-label"> Category</label>
                <input type="text" name="category" id="category" value="{{ expense.category }}" class="form-control" required>
            </div>
            
            <div class="col-md-6">
                <label for="amount" class="form-label"> Amount</label>
                <input type="number" name="amount" id="amount" step="0.01" value="{{ expense.amount }}" class="form-control" required>
            </div>
            
            <div class="col-12">
                <button type="submit" class="btn btn-success btn-lg"> Update Expense</button>
                <a href="{{ url_for('view_expenses') }}" class="btn btn-secondary btn-lg">⬅️ Cancel</a>
            </div>
        </form>
    </div>
</div>

<style>
    .form-control {
        background-color: #2a2a2a;
        border: 1px solid #333;
        color: #e0e0e0;
    }
    
    .form-control:focus {
        background-color: #333;
        border-color: #667eea;
        color: #e0e0e0;
    }
</style>
{% endblock %}
